<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Analyzer & Enhancer</title>
    <!-- Zero-Build Environment -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF and DOCX Native In-Browser Document Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.2s ease;}
        .glass-card:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.08); }
        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: btn-shimmer 2s infinite;
        }
        @keyframes btn-shimmer { 100% { left: 200%; } }

        /* Circular Progress */
        .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 3.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .percentage { fill: #1e293b; font-family: sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: bold;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // "home", "compare_setup", "optimize_setup", "analyzing", "results_compare", "results_optimize"
            const [step, setStep] = useState('home'); 
            
            // API Settings & Credentials
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [keyStatus, setKeyStatus] = useState('unverified'); 
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('models/gemini-1.5-pro-latest');

            // Data Payloads
            const [jdText, setJdText] = useState('');
            const [resumeText, setResumeText] = useState('');
            const [apiData, setApiData] = useState(null);
            
            // Revisions & UI State
            const [acceptedEnhancements, setAcceptedEnhancements] = useState({});
            const [acceptedPointers, setAcceptedPointers] = useState({});
            const [loadingMessageIndex, setLoadingMessageIndex] = useState(0);

            const fileInputRef = useRef(null);
            const [fileParsing, setFileParsing] = useState(false);
            const [isRegenerating, setIsRegenerating] = useState(false);

            const loadingMessages = [
                "Scanning document structure...",
                "Extracting technical artifacts & metrics...",
                "Cross-referencing heavily against Job Description...",
                "Applying tough recruiter scrutiny standards...",
                "Identifying critical skill gaps natively...",
                "Deriving algorithmic match percentage...",
                "Finalizing strict QA context..."
            ];

            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                }
                if (apiKey) validateApiKey(apiKey);
            }, []);

            // Dynamic loading message system
            useEffect(() => {
                let interval;
                if (step === 'analyzing') {
                    setLoadingMessageIndex(0);
                    interval = setInterval(() => {
                        setLoadingMessageIndex(prev => (prev < loadingMessages.length - 1 ? prev + 1 : prev));
                    }, 1800);
                }
                return () => clearInterval(interval);
            }, [step]);

            const validateApiKey = async (keyToTest) => {
                const targetKey = keyToTest || apiKey;
                if(!targetKey) return;
                
                setKeyStatus('checking');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${targetKey}`);
                    const data = await res.json();
                    
                    if (data.models) {
                        setKeyStatus('valid');
                        localStorage.setItem('gemini_api_key', targetKey);
                        
                        const geminiModels = data.models.filter(m => m.name.includes('gemini') && m.supportedGenerationMethods.includes("generateContent"));
                        setAvailableModels(geminiModels);
                        
                        const proModel = geminiModels.find(m => m.name.includes('gemini-1.5-pro'));
                        if(proModel) {
                            setSelectedModel(proModel.name);
                        } else if(geminiModels.length > 0) {
                            setSelectedModel(geminiModels[0].name); 
                        }
                    } else {
                        setKeyStatus('invalid');
                    }
                } catch (e) {
                    setKeyStatus('invalid');
                }
            };

            const triggerFileUpload = () => {
                if (fileInputRef.current) fileInputRef.current.click();
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileParsing(true);
                const fileName = file.name.toLowerCase();
                
                if (fileName.endsWith('.pdf') || file.type === 'application/pdf') {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        const typedarray = new Uint8Array(evt.target.result);
                        try {
                            const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                            let text = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                const strings = content.items.map(item => item.str);
                                text += strings.join(' ') + '\n';
                            }
                            setResumeText(text);
                            setFileParsing(false);
                        } catch (err) {
                            alert("Error parsing PDF locally: " + err);
                            setFileParsing(false);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } 
                else if (fileName.endsWith('.docx')) {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        try {
                            const result = await mammoth.extractRawText({ arrayBuffer: evt.target.result });
                            setResumeText(result.value);
                            setFileParsing(false);
                        } catch(err) {
                            alert("Error extracting DOCX locally");
                            setFileParsing(false);
                        }
                    }
                    reader.readAsArrayBuffer(file);
                }
                else {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        setResumeText(evt.target.result);
                        setFileParsing(false);
                    };
                    reader.readAsText(file);
                }
            };

            const executeCompareAlgorithm = async () => {
                if(!jdText || !resumeText) { alert('Please provide both JD and Resume.'); return; }
                if(keyStatus !== 'valid') { alert('Please validate your Gemini API Key first.'); return; }
                
                setStep('analyzing');
                setAcceptedPointers({});
                
                const prompt = `
                    You are an elite, ruthlessly tough Senior Technical Recruiter at a top-tier employer. You process thousands of resumes and heavily penalize candidates for fluff, missing data, and weak keyword integration. 
                    Act strictly as a gatekeeper. Scrutinize this Candidate Resume against the Job Description constraints without mercy.
                    
                    Job Description:
                    ${jdText}
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    INSTRUCTION: Output strictly valid JSON answering the following schema natively:
                    {
                        "score": [Number 0-100 indicating match percentage. BE EXTREMELY TOUGH. If they miss required skills, penalize this severely.],
                        "summary": "A 2-3 sentence ruthless executive summary of how well the candidate actually aligns, calling out major flaws explicitly.",
                        "matches": [
                            { "skill": "The precise skill/experience located in resume", "jdLink": "Why the JD explicitly requires this" }
                        ],
                        "missing": [
                            { "skill": "The precise missing constraint from the JD", "jdLink": "The severe reality of what missing this skill means for their chances" }
                        ],
                        "pointers": ["Actionable recommendation 1 to inject into resume", "Actionable recommendation 2"]
                    }
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    let rawResponse = data.candidates[0].content.parts[0].text;
                    rawResponse = rawResponse.replace(/```json/g, '').replace(/```/g, ''); 
                    
                    const parsed = JSON.parse(rawResponse);
                    
                    // Default all pointers to false (rejected)
                    const pState = {};
                    if(parsed.pointers) parsed.pointers.forEach((_, i) => pState[i] = false);
                    setAcceptedPointers(pState);

                    setApiData(parsed);
                    setStep('results_compare');
                } catch (err) {
                    alert("Analysis Failed: " + err.message);
                    setStep('compare_setup');
                }
            };

            const executeOptimizeAlgorithm = async () => {
                if(!resumeText) { alert('Please upload or paste a resume.'); return; }
                if(keyStatus !== 'valid') { alert('Please validate your Gemini API Key first.'); return; }
                
                setStep('analyzing');
                setAcceptedEnhancements({});
                
                const prompt = `
                    You are an Elite Resume Optimizer. Enhance the candidate's resume focusing perfectly on massive impact phrasing utilizing the STAR (Situation, Task, Action, Result) methodology. Elevate the professional tone, but DO NOT hallucinate fake data.
                    Candidate Resume:
                    ${resumeText}
                    INSTRUCTION: Output strictly valid JSON ONLY identifying areas that need rewriting:
                    {
                        "optimizedBullets": [
                            { 
                                "original": "the exact original underperforming sub-string from the input text", 
                                "optimized": "The powerful, visually-appealing enhanced line utilizing action verbs." 
                            }
                        ]
                    }
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);

                    let rawResponse = data.candidates[0].content.parts[0].text;
                    rawResponse = rawResponse.replace(/```json/g, '').replace(/```/g, ''); 
                    const parsed = JSON.parse(rawResponse);
                    
                    const defaultReject = {};
                    if (parsed.optimizedBullets) {
                        parsed.optimizedBullets.forEach((_, idx) => defaultReject[idx] = false);
                    }
                    setAcceptedEnhancements(defaultReject);
                    
                    setApiData(parsed);
                    setStep('results_optimize');
                } catch (err) {
                    alert("Optimization Failed: " + err.message);
                    setStep('optimize_setup');
                }
            };

            const generatePointerInjectedResume = async () => {
                const pointersToInject = apiData.pointers.filter((_, idx) => acceptedPointers[idx]);
                
                if(pointersToInject.length === 0) {
                    alert("You haven't accepted any pointers. Please check at least one box to intelligently weave it into your resume.");
                    return;
                }

                setIsRegenerating(true);
                const prompt = `
                    You are a Master Resume Architect. I am going to give you my current resume.
                    I am also giving you a list of strict Pointers that I want you to weave seamlessly into the resume.
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    Target Pointers To Inject Genuinely:
                    ${JSON.stringify(pointersToInject)}
                    
                    INSTRUCTION: Output NOTHING but the raw plain text of the newly rewritten resume containing the injected parameters. Do not output markdown, JSON, or conversation. Just the raw text document formatting.
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    let newText = data.candidates[0].content.parts[0].text;
                    
                    const element = document.createElement("a");
                    const file = new Blob([newText], {type: 'text/plain'});
                    element.href = URL.createObjectURL(file);
                    element.download = "Pointer_Injected_Resume.txt";
                    document.body.appendChild(element); 
                    element.click();

                } catch (e) {
                    alert("Regeneration failed! " + e.message);
                } finally {
                    setIsRegenerating(false);
                }
            };

            const generateLocalReplacedResume = () => {
                let updatedText = resumeText;
                let changesMade = false;

                apiData.optimizedBullets.forEach((bullet, idx) => {
                    if (acceptedEnhancements[idx]) {
                        updatedText = updatedText.replace(bullet.original, bullet.optimized);
                        changesMade = true;
                    }
                });
                
                if(!changesMade) {
                    alert("You must Accept at least one enhancement to generate an updated resume!");
                    return;
                }
                
                const element = document.createElement("a");
                const file = new Blob([updatedText], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = "Optimized_Resume.txt";
                document.body.appendChild(element); 
                element.click();
            };

            const renderHeader = () => (
                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-3 rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-slate-200 w-full mb-10 z-10 relative">
                    <div className="flex items-center w-full md:w-auto">
                        <input 
                            type="password" placeholder="Gemini API Key..." 
                            value={apiKey} onChange={(e) => { setApiKey(e.target.value); setKeyStatus('unverified'); }}
                            className="bg-slate-50 border border-slate-300 border-r-0 text-sm px-3 py-2 rounded-l-lg w-full md:w-64 outline-none focus:ring-2 focus:ring-indigo-500" 
                        />
                        <button onClick={() => validateApiKey()} className="bg-slate-800 text-white text-xs font-bold px-4 py-2.5 hover:bg-slate-700 transition border-y border-r border-slate-800">
                            {keyStatus === 'checking' ? 'Verifying...' : 'Validate'}
                        </button>
                        <div className="flex items-center justify-center bg-slate-100 border border-slate-300 border-l-0 rounded-r-lg px-3 py-2.5 h-[38px] w-[38px] shrink-0">
                            <div className={`w-3 h-3 rounded-full ${keyStatus === 'valid' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]' : keyStatus === 'unverified' ? 'bg-red-500' : keyStatus === 'checking' ? 'bg-yellow-400 animate-pulse' : 'bg-red-500'}`}></div>
                        </div>
                    </div>
                    
                    <div className="w-full md:w-auto flex items-center justify-end">
                        {keyStatus === 'valid' && availableModels.length > 0 && (
                            <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-300 shadow-inner w-full md:w-auto">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest whitespace-nowrap">Model Target:</span>
                                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)} className="bg-transparent text-xs font-bold text-slate-800 outline-none cursor-pointer w-full max-w-[250px]">
                                    {availableModels.map(m => (
                                        <option key={m.name} value={m.name}>{m.displayName} {m.name.includes('1.5-pro') ? '(Recommended)' : ''}</option>
                                    ))}
                                </select>
                            </div>
                        )}
                    </div>
                </div>
            );

            // ==================
            // COMPONENT SCREENS
            // ==================

            const renderHome = () => (
                <div className="w-full max-w-5xl mx-auto flex flex-col items-center animate-fade-in relative z-10 pt-4">
                    {renderHeader()}
                    
                    <div className="text-center mb-10 w-full">
                        <h1 className="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 drop-shadow-sm">ATS Resume <span className="text-indigo-600 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">Analyzer & Enhancer</span></h1>
                        <p className="text-slate-500 mt-4 text-[15px] font-medium w-full max-w-2xl mx-auto">Select an architectural pathway below to execute deep natural language validation against your document payloads.</p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 w-full">
                        <div onClick={() => setStep('compare_setup')} className="glass-card cursor-pointer p-10 flex flex-col items-center justify-center text-center border-2 border-transparent hover:border-indigo-400 group">
                            <div className="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center text-4xl mb-6 shadow-sm group-hover:scale-110 transition-transform">📊</div>
                            <h2 className="text-2xl font-bold mb-3 text-slate-800">Compare Resume Against JD</h2>
                            <p className="text-sm text-slate-500 leading-relaxed">Map your resume precisely against an employer's Job Description. Identify hard-skill gaps natively and generate tactical alignment scores.</p>
                        </div>

                        <div onClick={() => setStep('optimize_setup')} className="glass-card cursor-pointer p-10 flex flex-col items-center justify-center text-center border-2 border-transparent hover:border-indigo-400 group">
                            <div className="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center text-4xl mb-6 shadow-sm group-hover:scale-110 transition-transform">✨</div>
                            <h2 className="text-2xl font-bold mb-3 text-slate-800">Optimize Resume Impact</h2>
                            <p className="text-sm text-slate-500 leading-relaxed">Upload your document and let our AI engine automatically detect passive phrasing, offering line-by-line interactive STAR methodology upgrades.</p>
                        </div>
                    </div>
                </div>
            );

            const renderCompareSetup = () => (
                <div className="w-full max-w-7xl mx-auto animate-fade-in z-10 relative pt-4">
                    {renderHeader()}
                    <div className="flex items-center gap-4 mb-6">
                        <button onClick={() => setStep('home')} className="bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm hover:bg-slate-50 shadow-sm transition">← Menu</button>
                        <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Compare Against Job Description</h1>
                    </div>

                    <div className="grid lg:grid-cols-2 gap-8">
                        <div className="glass-card p-6 flex flex-col relative">
                            <h2 className="text-lg font-bold flex items-center gap-2 text-indigo-700 mb-4 tracking-tight">📄 Target Job Description</h2>
                            <textarea 
                                value={jdText} onChange={e => setJdText(e.target.value)}
                                placeholder="Paste the target Job Description exactly..." 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none min-h-[350px] text-sm"
                            ></textarea>
                        </div>

                        <div className="glass-card p-6 flex flex-col relative">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-lg font-bold flex items-center gap-2 text-blue-700 tracking-tight">👤 Current Resume</h2>
                                <button onClick={triggerFileUpload} className="text-xs font-bold px-4 py-2 rounded-lg bg-slate-900 text-white shadow-sm hover:bg-slate-800">📁 Upload Resume</button>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".txt,.pdf,application/pdf,.doc,.docx" onChange={handleFileUpload} />
                            </div>
                            <textarea 
                                value={resumeText} onChange={e => setResumeText(e.target.value)}
                                placeholder="Upload or paste your resume here..." 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none min-h-[350px] text-sm"
                            ></textarea>
                        </div>
                    </div>
                    <div className="flex justify-center mt-6">
                        <button onClick={executeCompareAlgorithm} className="shimmer-btn bg-indigo-600 border border-indigo-700 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-xl mt-2 mb-10 tracking-widest tracking-wide">
                            Start Resume Comparison →
                        </button>
                    </div>
                </div>
            );

            const renderOptimizeSetup = () => (
                <div className="w-full max-w-4xl mx-auto animate-fade-in z-10 relative pt-4">
                    {renderHeader()}
                    <div className="flex items-center gap-4 mb-6">
                        <button onClick={() => setStep('home')} className="bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm hover:bg-slate-50 shadow-sm transition">← Menu</button>
                        <h1 className="text-2xl font-bold text-slate-900 tracking-tight">Optimize Impact Architecture</h1>
                    </div>

                    <div className="glass-card p-8 flex flex-col relative">
                        <div className="flex flex-col md:flex-row items-center justify-between mb-6 shadow-sm border border-slate-100 bg-white p-4 rounded-xl">
                            <div>
                                <h2 className="text-lg font-bold text-slate-800 tracking-tight">Upload Your Document</h2>
                                <p className="text-xs text-slate-500">Supports PDF, DOCX, and TXT parsing natively.</p>
                            </div>
                            <button onClick={triggerFileUpload} className="text-sm mt-4 md:mt-0 font-bold px-6 py-3 rounded-lg bg-slate-900 text-white hover:bg-slate-800 tracking-widest uppercase">📁 Select Resume File</button>
                            <input type="file" ref={fileInputRef} className="hidden" accept=".txt,.pdf,application/pdf,.doc,.docx" onChange={handleFileUpload} />
                        </div>
                        <textarea 
                            value={resumeText} onChange={e => setResumeText(e.target.value)}
                            placeholder="File text payload will strictly populate here..." 
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl p-6 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-[400px] text-sm font-mono shadow-inner"
                        ></textarea>
                    </div>
                    
                    <div className="flex justify-center mt-6">
                        <button onClick={executeOptimizeAlgorithm} className="shimmer-btn bg-indigo-600 border border-indigo-700 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition shadow-xl mt-2 mb-10 tracking-wide">
                            Start Optimization Pipeline →
                        </button>
                    </div>
                </div>
            );

            const renderAnalyzing = () => (
                <div className="w-full max-w-2xl mx-auto flex flex-col items-center justify-center py-20 text-center z-10 relative">
                    <div className="w-20 h-20 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-10 shadow-lg"></div>
                    
                    <div className="h-16 flex items-center justify-center">
                        {isRegenerating ? (
                            <h2 className="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-800 tracking-tight animate-pulse">
                                Merging Updates into Resume...
                            </h2>
                        ) : (
                            <h2 className="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-slate-800 tracking-tight transition-all duration-300 keyframe-fade">
                                {loadingMessages[loadingMessageIndex] || "Executing..."}
                            </h2>
                        )}
                    </div>
                </div>
            );

            // ==================
            // RESULTS SCREENS
            // ==================

            const renderCompareResults = () => {
                if(!apiData) return null;
                return (
                    <div className="w-full max-w-6xl mx-auto animate-fade-in relative z-10 pt-4 pb-12">
                        {renderHeader()}
                        <div className="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
                            <button onClick={() => setStep('compare_setup')} className="bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm hover:bg-slate-50 shadow-sm transition">← Resume Editor</button>
                            <h2 className="text-2xl font-bold text-slate-800">Recruiter Alignment Report</h2>
                        </div>

                        <div className="glass-card p-6 md:p-10 mb-8 border-t-4 border-t-indigo-500">
                            <div className="flex flex-col md:flex-row items-center gap-10">
                                <div className="w-48 relative shrink-0">
                                    <svg viewBox="0 0 36 36" className="circular-chart text-indigo-600 drop-shadow-md">
                                        <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path className="circle" strokeDasharray={`${apiData.score || 0}, 100`} stroke="currentColor" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <text x="18" y="20.35" className="percentage">{apiData.score || 0}%</text>
                                    </svg>
                                    <p className="text-center text-[10px] font-bold text-slate-500 mt-4 tracking-widest uppercase">Strict Match Index</p>
                                </div>
                                <div className="flex-1 text-center md:text-left">
                                    <h3 className="text-2xl font-bold mb-3">Executive Scrutiny Summary</h3>
                                    <p className="text-slate-700 leading-relaxed text-lg bg-indigo-50/50 p-5 rounded-xl border border-indigo-100">{apiData.summary}</p>
                                </div>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8 mb-8">
                            <div className="glass-card p-6 rounded-xl border-t-4 border-t-emerald-400">
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2 text-emerald-800">✅ Key Validated Alignments</h3>
                                <ul className="space-y-5">
                                    {apiData.matches && apiData.matches.map((item, i) => (
                                        <li key={i} className="flex gap-4 text-sm text-slate-700 items-start">
                                            <span className="text-emerald-500 font-extrabold mt-0.5 text-lg">✓</span> 
                                            <div>
                                                <strong className="block text-slate-800 text-[15px]">{item.skill}</strong>
                                                <span className="text-xs text-slate-500 italic block mt-1 leading-relaxed"><strong className="text-emerald-700/60 not-italic">Satisfies JD:</strong> {item.jdLink}</span>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <div className="glass-card p-6 rounded-xl border-t-4 border-t-rose-500 shadow-[0_4px_25px_rgba(225,29,72,0.05)]">
                                <h3 className="text-lg font-bold mb-6 flex items-center gap-2 text-rose-800">⚠️ Critical Missing Requirements</h3>
                                <ul className="space-y-5">
                                    {apiData.missing && apiData.missing.map((item, i) => (
                                        <li key={i} className="flex gap-4 text-sm text-slate-700 items-start">
                                            <span className="text-rose-500 font-extrabold mt-0.5 text-lg">!</span> 
                                            <div>
                                                <strong className="block text-slate-800 text-[15px]">{item.skill}</strong>
                                                <span className="text-xs text-rose-600/80 italic block mt-1 leading-relaxed"><strong className="text-rose-800/60 not-italic">Rejection Threat:</strong> {item.jdLink}</span>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        <div className="bg-white border-2 border-indigo-200 rounded-2xl p-8 shadow-xl">
                            <div className="flex flex-col md:flex-row justify-between md:items-center gap-5 mb-6">
                                <div>
                                    <h3 className="text-2xl font-bold tracking-tight text-slate-900">Recommended Generative Pointers</h3>
                                    <p className="text-sm text-slate-500 mt-1">Accept the tactical pointers below. Our LLM will natively weave your accepted recommendations correctly into your resume layout to dramatically boost your match percentage.</p>
                                </div>
                                <button onClick={generatePointerInjectedResume} className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-6 py-4 rounded-xl shadow-md transition text-sm whitespace-nowrap shrink-0 border border-slate-700">
                                    Inject Pointers & Generate Resume ↓
                                </button>
                            </div>
                            
                            <div className="space-y-4">
                                {apiData.pointers && apiData.pointers.map((pointer, i) => (
                                    <div key={i} className={`p-4 rounded-xl border-2 flex items-center gap-4 transition ${acceptedPointers[i] ? 'border-indigo-400 bg-indigo-50/50 shadow-inner' : 'border-slate-200 bg-slate-50 cursor-pointer hover:bg-slate-100'}`} onClick={() => setAcceptedPointers(prev => ({...prev, [i]: !prev[i]}))}>
                                        <button 
                                            className={`w-8 h-8 rounded-full flex shrink-0 items-center justify-center font-bold transition border-2 ${acceptedPointers[i] ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-300 text-transparent'}`}
                                        >✓</button>
                                        <p className={`text-sm ${acceptedPointers[i] ? 'text-indigo-900 font-medium' : 'text-slate-600'}`}>{pointer}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                )
            };

            const renderOptimizeResults = () => {
                if(!apiData) return null;
                return (
                    <div className="w-full max-w-7xl mx-auto animate-fade-in relative z-10 pt-4 pb-12">
                        {renderHeader()}
                        <div className="flex justify-between items-center mb-8 border-b border-slate-200 pb-4">
                            <button onClick={() => setStep('optimize_setup')} className="bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm hover:bg-slate-50 shadow-sm transition">← Upload Target</button>
                            <button onClick={generateLocalReplacedResume} className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-8 py-3 rounded-xl shadow-lg transition">
                                Compile Final Resume ↓
                            </button>
                        </div>

                        <div className="glass-card flex flex-col h-full bg-white/60">
                            <div className="p-8 pb-4">
                                <h3 className="text-2xl font-bold tracking-tight mb-2 text-slate-800">Line-by-Line Impact Mapping</h3>
                                <p className="text-sm text-slate-500 font-medium px-4 py-2 bg-yellow-50 text-yellow-700 border border-yellow-200 rounded-lg inline-block">
                                    Note: All algorithm enhancements are explicitly REJECTED by default. You must click Accept to merge them into your final compilation.
                                </p>
                            </div>

                            <div className="space-y-6 flex-1 px-8 pb-10">
                                {apiData.optimizedBullets && apiData.optimizedBullets.length > 0 ? apiData.optimizedBullets.map((b, i) => (
                                    <div key={i} className={`p-6 rounded-2xl border-2 transition shadow-sm ${acceptedEnhancements[i] ? 'border-emerald-400 bg-emerald-50/10' : 'border-slate-200 bg-white'}`}>
                                        <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                            <h4 className="text-xs font-bold uppercase tracking-widest text-slate-400">Statement Identification #{i + 1}</h4>
                                            
                                            <button 
                                                onClick={() => setAcceptedEnhancements(prev => ({...prev, [i]: !prev[i]}))}
                                                className={`text-xs font-bold px-5 py-2 rounded-lg transition shadow-sm border-2 ${acceptedEnhancements[i] ? 'bg-emerald-100 text-emerald-800 border-emerald-300 hover:bg-emerald-200 ring-2 ring-emerald-500/20' : 'bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100'}`}
                                            >
                                                {acceptedEnhancements[i] ? '✓ ACTIVE: INJECT STATEMENT' : '✗ REJECTED: KEEP ORIGINAL'}
                                            </button>
                                        </div>
                                        
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="relative">
                                                <span className="absolute top-[-10px] left-4 px-2 bg-white text-rose-500 rounded text-[10px] uppercase font-extrabold tracking-widest">Original Parse</span>
                                                <div className="text-sm font-mono text-slate-500 bg-slate-50 border border-slate-200 px-4 py-6 rounded-xl line-through decoration-rose-300 decoration-2">
                                                    {b.original}
                                                </div>
                                            </div>
                                            <div className="relative">
                                                <span className="absolute top-[-10px] left-4 px-2 bg-white text-emerald-600 rounded text-[10px] uppercase font-extrabold tracking-widest flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Enhanced Alignment</span>
                                                <div className={`text-sm font-mono bg-white border px-4 py-6 rounded-xl shadow-inner font-medium leading-relaxed transition ${acceptedEnhancements[i] ? 'text-emerald-900 border-emerald-300 shadow-[inset_0_0_15px_rgba(16,185,129,0.1)]' : 'text-slate-800 border-slate-200'}`}>
                                                    {b.optimized}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )) : (
                                    <p className="text-sm text-slate-500 italic p-10 text-center border-2 border-dashed border-slate-300 rounded-2xl bg-white/50">No optimization targets algorithmically detected. Ensure context implies actionable history.</p>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-800 pb-20 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-[800px] h-[800px] bg-indigo-50 rounded-full blur-3xl opacity-50 -z-10 translate-x-[40%] -translate-y-[40%] pointer-events-none"></div>
                    
                    {step === 'home' && renderHome()}
                    {step === 'compare_setup' && renderCompareSetup()}
                    {step === 'optimize_setup' && renderOptimizeSetup()}
                    
                    {step === 'analyzing' && renderAnalyzing()}
                    
                    {step === 'results_compare' && renderCompareResults()}
                    {step === 'results_optimize' && renderOptimizeResults()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
