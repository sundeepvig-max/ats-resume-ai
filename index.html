<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Analyzer & Enhancer</title>
    <!-- Zero-Build Environment -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF and DOCX Native In-Browser Document Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); transition: all 0.2s ease;
        }
        .dark .glass-card {
            background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(51, 65, 85, 0.8); box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .glass-card:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.08); }
        .dark .glass-card:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.4); }

        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: btn-shimmer 2.5s infinite;
        }
        @keyframes btn-shimmer { 100% { left: 200%; } }

        .bars-container { display: flex; align-items: center; justify-content: center; gap: 6px; height: 60px; margin-bottom: 20px;}
        .anim-bar { width: 8px; background-color: #4f46e5; border-radius: 4px; animation: bounce 1.2s infinite ease-in-out; }
        .dark .anim-bar { background-color: #818cf8; }
        .anim-bar:nth-child(1) { animation-delay: -1.0s; }
        .anim-bar:nth-child(2) { animation-delay: -0.9s; }
        .anim-bar:nth-child(3) { animation-delay: -0.8s; }
        .anim-bar:nth-child(4) { animation-delay: -0.7s; }
        .anim-bar:nth-child(5) { animation-delay: -0.6s; }
        @keyframes bounce { 0%, 40%, 100% { height: 20%; } 20% { height: 100%; box-shadow: 0 0 10px rgba(79,70,229,0.5); } }

        /* Circular Progress */
        .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .dark .circle-bg { stroke: #334155; }
        .circle { fill: none; stroke-width: 3.8; stroke-linecap: round; animation: progress 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .percentage { fill: #1e293b; font-family: sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: bold;}
        .dark .percentage { fill: #f8fafc; }

        .progress-bar-container { width: 100%; height: 6px; background-color: #e2e8f0; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .dark .progress-bar-container { background-color: #334155; }
        .progress-bar-fill { height: 100%; background-color: #4f46e5; transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex">
    <div id="root" class="w-full h-full min-h-screen flex"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // Navigation Routing
            const [currentView, setCurrentView] = useState('home'); // home, compare, optimize, settings
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);

            // UI Flow step per module
            const [compareStep, setCompareStep] = useState('input'); // input, analyzing, results
            const [optimizeStep, setOptimizeStep] = useState('input'); // input, analyzing, results
            
            // Global Settings
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [keyStatus, setKeyStatus] = useState('unverified'); 
            const [availableModels, setAvailableModels] = useState([]);
            const [selectedModel, setSelectedModel] = useState('models/gemini-1.5-pro-latest');
            
            // Theme preference: 'light', 'dark', or 'auto'
            const [themePreference, setThemePreference] = useState(localStorage.getItem('theme_pref') || 'auto');

            // Form Data
            const [jdText, setJdText] = useState('');
            const [resumeText, setResumeText] = useState(localStorage.getItem('default_resume') || '');
            const [savedResumeSetting, setSavedResumeSetting] = useState(localStorage.getItem('default_resume') || '');
            
            // Scroll State
            const [showScrollTop, setShowScrollTop] = useState(false);
            
            // Results Data
            const [apiDataCompare, setApiDataCompare] = useState(null);
            const [apiDataOptimize, setApiDataOptimize] = useState(null);
            const [acceptedEnhancements, setAcceptedEnhancements] = useState({});
            const [acceptedPointers, setAcceptedPointers] = useState({});
            
            // Phase 3 State
            const [historyData, setHistoryData] = useState(() => JSON.parse(localStorage.getItem('ats_history') || '[]'));
            const [coverLetterStep, setCoverLetterStep] = useState('input');
            const [clData, setClData] = useState('');
            const [coverLetterLength, setCoverLetterLength] = useState('Medium');

            // System State
            const fileInputRefCompare = useRef(null);
            const fileInputRefOptimize = useRef(null);
            const fileInputRefSettings = useRef(null);
            const fileInputRefCover = useRef(null);
            const [fileParsing, setFileParsing] = useState(false);
            const [isRegenerating, setIsRegenerating] = useState(false);
            
            // Loading Animation State
            const [loadingMessageIndex, setLoadingMessageIndex] = useState(0);
            const [loadingProgress, setLoadingProgress] = useState(0);

            const loadingMessages = [
                "Scanning your document...",
                "Reading your history and skills...",
                "Comparing your experience thoroughly to the job requirements...",
                "Applying strict recruiter standards...",
                "Looking for critical skill gaps...",
                "Calculating your match percentage...",
                "Finalizing recommendations..."
            ];

            // Setup dependencies on mount
            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                }
                if (apiKey) validateApiKey(apiKey);
                
                const handleScroll = () => setShowScrollTop(window.scrollY > 300);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Theme Setting Watcher (Light / Dark / Auto)
            useEffect(() => {
                localStorage.setItem('theme_pref', themePreference);
                
                const applyTheme = (isDark) => {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                };

                if (themePreference === 'dark') {
                    applyTheme(true);
                } else if (themePreference === 'light') {
                    applyTheme(false);
                } else if (themePreference === 'auto') {
                    // Logic: 6 PM to 6 AM is Dark Mode. Else Light Mode.
                    const currentHour = new Date().getHours();
                    const isNightTime = currentHour >= 18 || currentHour < 6;
                    applyTheme(isNightTime);
                }
            }, [themePreference]);

            // Unified Loading Animation Watcher
            useEffect(() => {
                let textInterval, progInterval;
                const isAnalyzing = compareStep === 'analyzing' || optimizeStep === 'analyzing';
                
                if (isAnalyzing) {
                    setLoadingMessageIndex(0);
                    setLoadingProgress(0);
                    
                    // Slow, readable text transitions
                    textInterval = setInterval(() => {
                        setLoadingMessageIndex(prev => (prev < loadingMessages.length - 1 ? prev + 1 : prev));
                    }, 3000);

                    // Simulated fluid progress bar
                    progInterval = setInterval(() => {
                        setLoadingProgress(prev => {
                            if (prev >= 92) return 92; // Lock at 92% until api technically finishes
                            return prev + Math.floor(Math.random() * 4) + 1;
                        });
                    }, 400);
                }
                return () => { clearInterval(textInterval); clearInterval(progInterval); };
            }, [compareStep, optimizeStep]);


            const validateApiKey = async (keyToTest) => {
                const targetKey = keyToTest || apiKey;
                if(!targetKey) return;
                
                setKeyStatus('checking');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${targetKey}`);
                    const data = await res.json();
                    
                    if (data.models) {
                        setKeyStatus('valid');
                        localStorage.setItem('gemini_api_key', targetKey);
                        
                        const geminiModels = data.models.filter(m => m.name.includes('gemini') && m.supportedGenerationMethods.includes("generateContent"));
                        setAvailableModels(geminiModels);
                        
                        const proModel = geminiModels.find(m => m.name.includes('gemini-1.5-pro'));
                        if(proModel) {
                            setSelectedModel(proModel.name);
                        } else if(geminiModels.length > 0) {
                            setSelectedModel(geminiModels[0].name); 
                        }
                    } else {
                        setKeyStatus('invalid');
                    }
                } catch (e) {
                    setKeyStatus('invalid');
                }
            };

            const handleFileUpload = async (e, setTargetText) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileParsing(true);
                const fileName = file.name.toLowerCase();
                
                if (fileName.endsWith('.pdf') || file.type === 'application/pdf') {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        const typedarray = new Uint8Array(evt.target.result);
                        try {
                            const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                            let text = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                const strings = content.items.map(item => item.str);
                                text += strings.join(' ') + '\n';
                            }
                            setTargetText(text);
                        } catch (err) {
                            alert("Error parsing PDF locally: " + err);
                        } finally {
                            setFileParsing(false);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } 
                else if (fileName.endsWith('.docx')) {
                    const reader = new FileReader();
                    reader.onload = async (evt) => {
                        try {
                            const result = await mammoth.extractRawText({ arrayBuffer: evt.target.result });
                            setTargetText(result.value);
                        } catch(err) {
                            alert("Error extracting DOCX locally.");
                        } finally {
                            setFileParsing(false);
                        }
                    }
                    reader.readAsArrayBuffer(file);
                }
                else {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        setTargetText(evt.target.result);
                        setFileParsing(false);
                    };
                    reader.readAsText(file);
                }
            };

            // =========================
            // COMPARE RESUME ENGINE
            // =========================

            const executeCompareAlgorithm = async () => {
                if(!jdText || !resumeText) { alert('Please provide both the Job Description and your Resume.'); return; }
                if(keyStatus !== 'valid') { alert('Please validate your AI Key in Settings first.'); setCurrentView('settings'); return; }
                
                setCompareStep('analyzing');
                setAcceptedPointers({});
                
                const prompt = `
                    You are a tough, detail-oriented Senior Technical Recruiter. Review this resume aggressively against the exact Job Description requirements.
                    Do not assume skills they haven't explicitly listed.
                    
                    Job Description:
                    ${jdText}
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    INSTRUCTION: Output strictly valid JSON answering the following schema:
                    {
                        "score": [Number 0-100 indicating match percentage. Be extremely strict.],
                        "summary": "A friendly 2-3 sentence summary explaining how well their experience matches the job overall.",
                        "matches": [
                            { "skill": "What matched nicely", "jdLink": "Why this was important for the job" }
                        ],
                        "missing": [
                            { "skill": "The exact skill or requirement missing", "jdLink": "Why missing this hurts their chances" }
                        ],
                        "pointers": ["A specific change they can make to their resume to improve their match score"]
                    }
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    let rawResponse = data.candidates[0].content.parts[0].text;
                    rawResponse = rawResponse.replace(/```json/g, '').replace(/```/g, ''); 
                    
                    const parsed = JSON.parse(rawResponse);
                    
                    const pState = {};
                    if(parsed.pointers) parsed.pointers.forEach((_, i) => pState[i] = false);
                    setAcceptedPointers(pState);

                    setLoadingProgress(100);
                    setTimeout(() => {
                        setApiDataCompare(parsed);
                        setCompareStep('results');
                        
                        // Phase 3: Archive History
                        const newHistory = [{
                            date: new Date().toLocaleDateString(),
                            jdSnippet: jdText.substring(0, 100) + '...',
                            score: parsed.score || 0
                        }, ...(JSON.parse(localStorage.getItem('ats_history') || '[]'))].slice(0, 15);
                        localStorage.setItem('ats_history', JSON.stringify(newHistory));
                        setHistoryData(newHistory);
                    }, 500);

                } catch (err) {
                    alert("Analysis Failed. Please check network or API rate limits. Error: " + err.message);
                    setCompareStep('input');
                }
            };

            const generatePointerInjectedResume = async () => {
                const pointersToInject = apiDataCompare.pointers.filter((_, idx) => acceptedPointers[idx]);
                
                if(pointersToInject.length === 0) {
                    alert("Please select at least one checkmark recommendation to add to your resume!");
                    return;
                }

                setIsRegenerating(true);
                const prompt = `
                    I am giving you my current resume. Please rewrite it slightly by seamlessly incorporating the exact improvements I listed below. Do not drastically change the format, just add the new details professionally.
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    Improvements to Add:
                    ${JSON.stringify(pointersToInject)}
                    
                    INSTRUCTION: Output only the raw plain text of the newly rewritten resume. Do not use JSON or explanation.
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    let newText = data.candidates[0].content.parts[0].text;
                    
                    const element = document.createElement("a");
                    const file = new Blob([newText], {type: 'text/plain'});
                    element.href = URL.createObjectURL(file);
                    element.download = "Improved_Resume.txt";
                    document.body.appendChild(element); 
                    element.click();

                } catch (e) {
                    alert("Generation failed... " + e.message);
                } finally {
                    setIsRegenerating(false);
                }
            };

            // =========================
            // OPTIMIZE RESUME ENGINE
            // =========================

            const executeOptimizeAlgorithm = async () => {
                if(!resumeText) { alert('Please upload or paste your resume first.'); return; }
                if(keyStatus !== 'valid') { alert('Please validate your AI Key in Settings first.'); setCurrentView('settings'); return; }
                
                setOptimizeStep('analyzing');
                setAcceptedEnhancements({});
                
                const prompt = `
                    You are an expert Resume Writer. Your goal is to rewrite passive or boring resume bullet points into strong, professional STAR (Situation, Task, Action, Result) formatted bullets using strong action verbs. Do not invent fake experience.
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    INSTRUCTION: Output strictly valid JSON with lines that can be improved:
                    {
                        "optimizedBullets": [
                            { 
                                "original": "exact original sentence from resume", 
                                "optimized": "The strongly written professional improvement" 
                            }
                        ]
                    }
                `;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);

                    let rawResponse = data.candidates[0].content.parts[0].text;
                    rawResponse = rawResponse.replace(/```json/g, '').replace(/```/g, ''); 
                    const parsed = JSON.parse(rawResponse);
                    
                    const defaultReject = {};
                    if (parsed.optimizedBullets) {
                        parsed.optimizedBullets.forEach((_, idx) => defaultReject[idx] = false); // Default rejected
                    }
                    setAcceptedEnhancements(defaultReject);
                    
                    setLoadingProgress(100);
                    setTimeout(() => {
                        setApiDataOptimize(parsed);
                        setOptimizeStep('results');
                    }, 500);

                } catch (err) {
                    alert("Optimization Failed. Error: " + err.message);
                    setOptimizeStep('input');
                }
            };

            const generateLocalReplacedResume = () => {
                let updatedText = resumeText;
                let changesMade = false;

                apiDataOptimize.optimizedBullets.forEach((bullet, idx) => {
                    if (acceptedEnhancements[idx]) {
                        updatedText = updatedText.replace(bullet.original, bullet.optimized);
                        changesMade = true;
                    }
                });
                
                if(!changesMade) {
                    alert("You must click 'Accept' on at least one enhancement to download the updated resume!");
                    return;
                }
                
                const element = document.createElement("a");
                const file = new Blob([updatedText], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = "Professionally_Rewritten_Resume.txt";
                document.body.appendChild(element); 
                element.click();
            };

            // =========================
            // COVER LETTER MODULE
            // =========================
            
            const executeCoverLetterGenerator = async () => {
                if(!jdText || !resumeText) { alert('Please provide BOTH the JD and Resume first (easiest via Compare Tab).'); return; }
                if(keyStatus !== 'valid') { alert('Please validate your AI Key.'); setCurrentView('settings'); return; }
                
                setCoverLetterStep('analyzing');
                let lengthConstraint = "";
                if(coverLetterLength === 'Concise') lengthConstraint = "Keep it very concise, impactful, and under 200 words.";
                if(coverLetterLength === 'Medium') lengthConstraint = "Write a standard professional length cover letter (around 300 words).";
                if(coverLetterLength === 'Long') lengthConstraint = "Write a detailed and highly comprehensive cover letter expanding strongly on specific resume points (over 400 words).";
                
                const prompt = `You are an elite Executive Career Coach. Write a highly tailored, persuasive, and professional Cover Letter for this exact Job Description using only facts from this candidate's Resume. Format it ready to be sent (including placeholders for [Date], [Company Name], etc if not explicit). \n\n${lengthConstraint}\n\nJob Description:\n${jdText}\n\nCandidate Resume:\n${resumeText}\n\nINSTRUCTION: Output only the plain text body of the cover letter with professional spacing.`;

                try {
                    const endpoint = selectedModel.includes('models/') ? selectedModel : `models/${selectedModel}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${endpoint}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    
                    setLoadingProgress(100);
                    setTimeout(() => {
                        setClData(data.candidates[0].content.parts[0].text);
                        setCoverLetterStep('results');
                    }, 500);
                } catch(e) {
                    alert("Generation Failed: " + e.message);
                    setCoverLetterStep('input');
                }
            };

            const downloadCoverLetter = () => {
                const element = document.createElement("a");
                const file = new Blob([clData], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = "Tailored_Cover_Letter.txt";
                document.body.appendChild(element); 
                element.click();
            };

            // =========================
            // SHARED COMPONENTS
            // =========================

            const renderLoadingState = () => (
                <div className="w-full max-w-2xl mx-auto flex flex-col items-center justify-center py-32 text-center relative">
                    <div className="bars-container">
                        <div className="anim-bar"></div>
                        <div className="anim-bar"></div>
                        <div className="anim-bar"></div>
                        <div className="anim-bar"></div>
                        <div className="anim-bar"></div>
                    </div>
                    
                    <div className="h-16 flex items-center justify-center w-full px-4 mb-2">
                        <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight transition-all duration-300 min-h-[64px] flex items-center justify-center">
                            {loadingMessages[loadingMessageIndex] || "Working on it..."}
                        </h2>
                    </div>
                    <div className="text-indigo-600 dark:text-indigo-400 font-bold mb-4 text-lg">
                        {loadingProgress}%
                    </div>
                </div>
            );


            // =========================
            // SIDEBAR LAYOUT
            // =========================

            const renderSidebar = () => {
                return (
                    <div className={`${isSidebarCollapsed ? 'w-20' : 'w-64'} transition-all duration-300 ease-in-out bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 hidden md:flex flex-col h-screen fixed left-0 top-0 shadow-sm z-50`}>
                        <div className={`p-6 border-b border-slate-100 dark:border-slate-800 relative flex items-center h-[85px] ${isSidebarCollapsed ? 'justify-center' : 'justify-between'}`}>
                            {!isSidebarCollapsed && (
                                <h1 onClick={() => setCurrentView('home')} className="text-lg font-extrabold text-slate-900 dark:text-white leading-tight overflow-hidden whitespace-nowrap cursor-pointer hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
                                    ATS Resume <br />
                                    <span className="text-indigo-600 dark:text-indigo-400">Analyzer</span>
                                </h1>
                            )}
                            {isSidebarCollapsed && (
                                <div onClick={() => setCurrentView('home')} className="font-extrabold text-indigo-600 dark:text-indigo-400 text-2xl cursor-pointer">📝</div>
                            )}

                            {/* Collapse Toggle Bubble */}
                            <button 
                                onClick={() => setIsSidebarCollapsed(!isSidebarCollapsed)}
                                className={`absolute top-1/2 -translate-y-1/2 -right-4 w-8 h-8 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full shadow flex items-center justify-center text-slate-500 hover:text-indigo-600 transition-colors z-50 hover:scale-105`}
                            >
                                {isSidebarCollapsed ? '→' : '←'}
                            </button>
                        </div>
                        
                        <div className="flex-1 py-6 flex flex-col gap-2 px-3 overflow-y-auto overflow-x-hidden relative">
                            <button 
                                onClick={() => setCurrentView('compare')} 
                                className={`flex items-center gap-3 py-3 rounded-xl font-medium transition-all ${isSidebarCollapsed ? 'justify-center px-0' : 'px-4'} ${currentView === 'compare' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800/50 shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 border border-transparent'}`}
                                title="Compare vs JD"
                            >
                                <span className="text-xl">📊</span> 
                                {!isSidebarCollapsed && <span className="whitespace-nowrap">Compare vs JD</span>}
                            </button>
                            
                            <button 
                                onClick={() => setCurrentView('optimize')} 
                                className={`flex items-center gap-3 py-3 rounded-xl font-medium transition-all ${isSidebarCollapsed ? 'justify-center px-0' : 'px-4'} ${currentView === 'optimize' ? 'bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300 border border-indigo-100 dark:border-indigo-800/50 shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 border border-transparent'}`}

                                                    <span className="inline-block mb-3 px-3 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded font-bold text-[11px] uppercase tracking-wider">Before</span>
                                                    <div className="text-[15px] p-5 rounded-xl text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 line-through decoration-rose-300 dark:decoration-rose-500/50 decoration-2 leading-relaxed w-full h-[calc(100%-30px)] break-words break-all md:break-normal">
                                                        {b.original}
                                                    </div>
                                                </div>
                                                <div className="w-full">
                                                    <span className="inline-block mb-3 px-3 py-1 bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300 rounded font-bold text-[11px] uppercase tracking-wider">After (Professional Format)</span>
                                                    <div className={`text-[15px] p-5 rounded-xl font-medium leading-relaxed border transition w-full h-[calc(100%-30px)] break-words break-all md:break-normal ${acceptedEnhancements[i] ? 'text-emerald-900 dark:text-emerald-100 border-emerald-300 dark:border-emerald-500/50 bg-white dark:bg-slate-800 shadow-[inset_0_0_15px_rgba(16,185,129,0.05)]' : 'text-slate-800 dark:text-slate-300 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800'}`}>
                                                        {b.optimized}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="p-10 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-3xl text-center">
                                            <span className="text-4xl block mb-4">🏆</span>
                                            <p className="text-slate-600 dark:text-slate-400 font-bold">Your resume looks thoroughly professional already! We didn't find any glaring sentences to reformat.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="w-full max-w-4xl mx-auto animate-fade-in pt-8 pb-20">
                        <h1 className="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-2">Optimize Resume Tool</h1>
                        <p className="text-slate-500 dark:text-slate-400 mb-8 font-medium">Upload your resume to have our AI clean up passive text and apply strong professional action phrases automatically.</p>

                        <div className="glass-card p-8 flex flex-col w-full overflow-hidden">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 shadow-sm border border-slate-100 dark:border-slate-700 bg-white dark:bg-slate-800 p-5 rounded-xl gap-4">
                                <div>
                                    <h2 className="font-bold text-slate-800 dark:text-slate-100">Your Document</h2>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">Upload a PDF, Word DOCX, or Text file.</p>
                                </div>
                                <button onClick={() => fileInputRefOptimize.current.click()} disabled={fileParsing} className="text-sm sm:mt-0 font-bold px-6 py-3 rounded-lg bg-slate-900 dark:bg-slate-700 text-white hover:bg-slate-800 disabled:opacity-50 whitespace-nowrap">
                                    📁 Select File
                                </button>
                                <input type="file" ref={fileInputRefOptimize} className="hidden" accept=".txt,.pdf,application/pdf,.doc,.docx" onChange={(e) => handleFileUpload(e, setResumeText)} />
                            </div>
                            <textarea 
                                value={resumeText} onChange={e => setResumeText(e.target.value)} disabled={fileParsing}
                                placeholder="Extracted text will appear here. Or just paste your resume directly..." 
                                className="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl p-6 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-[400px] text-sm text-slate-800 dark:text-slate-200 shadow-inner"
                            ></textarea>
                            {fileParsing && (
                                <div className="absolute inset-0 bg-white/60 dark:bg-slate-900/60 backdrop-blur-sm flex items-center justify-center rounded-2xl">
                                    <p className="font-bold text-slate-800 dark:text-white">Reading file...</p>
                                </div>
                            )}
                        </div>
                        
                        <div className="flex justify-center mt-10">
                            <button onClick={executeOptimizeAlgorithm} className="shimmer-btn bg-indigo-600 text-white px-12 py-5 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-600/20 transition">
                                Scan & Improve Format →
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex w-full min-h-screen">
                    {renderSidebar()}
                    <div className={`flex-1 transition-all duration-300 ease-in-out px-4 md:p-10 relative h-full ${isSidebarCollapsed ? 'md:ml-20' : 'md:ml-64'} overflow-x-hidden w-full max-w-[100vw]`}>
                        
                        {/* Background Deco */}
                        <div className="fixed top-0 right-0 w-[600px] h-[600px] bg-indigo-100 dark:bg-indigo-900/10 rounded-full blur-[100px] -z-10 translate-x-[20%] -translate-y-[20%] pointer-events-none"></div>

                        {currentView === 'home' && (
                            <div className="w-full max-w-4xl mx-auto animate-fade-in pt-20 pb-20 text-center">
                                <h1 className="text-5xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-6">Welcome to <span className="text-indigo-600 dark:text-indigo-400">AuraHome AI</span> Resume Engine</h1>
                                <p className="text-xl text-slate-600 dark:text-slate-300 mb-10 max-w-2xl mx-auto leading-relaxed">Your end-to-end local platform for ruthlessly analyzing and professionally formatting your resume to bypass ATS filters.</p>
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                                    <button onClick={() => setCurrentView('compare')} className="shimmer-btn bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-600/20 transition w-full sm:w-auto">Compare vs JD →</button>
                                    <button onClick={() => setCurrentView('optimize')} className="bg-white dark:bg-slate-800 text-indigo-600 dark:text-indigo-400 border-2 border-indigo-100 dark:border-slate-700 px-8 py-4 rounded-xl font-bold text-lg hover:border-indigo-300 dark:hover:border-indigo-500 shadow-sm transition w-full sm:w-auto">Optimize Resume ✨</button>
                                </div>
                            </div>
                        )}
                        {currentView === 'compare' && renderCompareModule()}
                        {currentView === 'optimize' && renderOptimizeModule()}
                        
                        {currentView === 'coverletter' && (
                            <div className="w-full max-w-6xl mx-auto animate-fade-in pt-8 pb-20">
                                {coverLetterStep === 'analyzing' ? renderLoadingState() : coverLetterStep === 'results' ? (
                                    <div className="animate-fade-in">
                                        <div className="flex justify-between items-center mb-8 border-b border-slate-200 dark:border-slate-800 pb-4">
                                            <button onClick={() => setCoverLetterStep('input')} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-5 py-2.5 rounded-xl font-bold text-sm shadow-sm transition dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700">← Edit Inputs</button>
                                            <button onClick={downloadCoverLetter} className="bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 text-white font-bold px-8 py-3 rounded-xl shadow-lg transition text-sm">Download Cover Letter ↓</button>
                                        </div>
                                        <div className="glass-card p-10 mt-6 dark:bg-slate-800/80 shadow-md">
                                            <textarea className="w-full h-[600px] bg-transparent border-none focus:outline-none resize-none font-medium leading-relaxed dark:text-slate-200 text-slate-800" value={clData} onChange={e=>setClData(e.target.value)}></textarea>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="mb-8">
                                            <h1 className="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-2">Cover Letter Generator</h1>
                                            <p className="text-slate-500 dark:text-slate-400 font-medium">Instantly generate a highly tailored cover letter based on your current resume and an explicit job description.</p>
                                        </div>
                                        <div className="glass-card p-6 mb-8 flex flex-col md:flex-row items-center gap-4 justify-between border-t-8 border-indigo-500">
                                            <div>
                                                <h2 className="text-lg font-bold flex items-center gap-2 text-indigo-700 dark:text-indigo-400">📝 Generation Options</h2>
                                                <p className="text-sm text-slate-500 dark:text-slate-400">Select the desired cover letter length.</p>
                                            </div>
                                            <select value={coverLetterLength} onChange={e=>setCoverLetterLength(e.target.value)} className="bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg p-3 outline-none text-sm font-bold shadow-inner text-slate-800 dark:text-slate-200">
                                                <option value="Concise">Concise (Short & Punchy)</option>
                                                <option value="Medium">Medium (Standard)</option>
                                                <option value="Long">Detailed (Comprehensive)</option>
                                            </select>
                                        </div>

                                        <div className="grid lg:grid-cols-2 gap-8 mb-8">
                                            <div className="glass-card p-6 flex flex-col relative w-full overflow-hidden">
                                                <h2 className="text-lg font-bold flex items-center gap-2 text-indigo-700 dark:text-indigo-400 mb-4">📄 Target Job Description</h2>
                                                <textarea 
                                                    value={jdText} onChange={e => setJdText(e.target.value)}
                                                    placeholder="Paste the job requirements here..." 
                                                    className="flex-1 w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-5 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none min-h-[300px] text-sm dark:text-white shadow-inner"
                                                ></textarea>
                                            </div>

                                            <div className="glass-card p-6 flex flex-col relative w-full overflow-hidden">
                                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
                                                    <h2 className="text-lg font-bold flex items-center gap-2 text-blue-700 dark:text-blue-400 whitespace-nowrap">👤 Your Resume</h2>
                                                    <button onClick={() => fileInputRefCover.current.click()} disabled={fileParsing} className="text-xs shrink-0 font-bold px-4 py-2 rounded-lg bg-slate-900 dark:bg-slate-700 text-white shadow-sm hover:bg-slate-800 disabled:opacity-50 transition">
                                                        📁 Upload File
                                                    </button>
                                                    <input type="file" ref={fileInputRefCover} className="hidden" accept=".txt,.pdf,application/pdf,.doc,.docx" onChange={(e) => handleFileUpload(e, setResumeText)} />
                                                </div>
                                                <textarea 
                                                    value={resumeText} onChange={e => setResumeText(e.target.value)} disabled={fileParsing}
                                                    placeholder="Or simply paste your resume text here..." 
                                                    className="flex-1 w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-5 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none min-h-[300px] text-sm dark:text-white shadow-inner"
                                                ></textarea>
                                                {fileParsing && (
                                                    <div className="absolute inset-0 bg-white/60 dark:bg-slate-900/60 backdrop-blur-sm flex items-center justify-center rounded-2xl">
                                                        <p className="font-bold text-slate-800 dark:text-white">Reading file...</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div className="flex justify-center">
                                            <button onClick={executeCoverLetterGenerator} className="shimmer-btn bg-indigo-600 text-white px-12 py-5 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-600/20 transition">Write My Cover Letter ✨</button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {currentView === 'history' && (
                            <div className="w-full max-w-5xl mx-auto animate-fade-in pt-8 pb-20">
                                <h1 className="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-2">Score Tracker History</h1>
                                <p className="text-slate-500 dark:text-slate-400 mb-8 font-medium">A local record of your past resume matchups. Clear history inside your browser data if needed.</p>
                                
                                {historyData.length > 0 ? (
                                    <div className="grid gap-6">
                                        {historyData.map((item, i) => (
                                            <div key={i} className="glass-card p-6 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:-translate-y-1 transition-all">
                                                <div className="flex-1">
                                                    <span className="text-xs font-bold uppercase text-indigo-500 tracking-widest mb-2 block">{item.date}</span>
                                                    <p className="text-sm text-slate-600 dark:text-slate-300 italic">"...{item.jdSnippet}"</p>
                                                </div>
                                                <div className="flex flex-col items-center justify-center shrink-0 w-24 h-24 rounded-full border-4 shadow-inner bg-slate-50 dark:bg-slate-800 border-indigo-100 dark:border-slate-700">
                                                    <span className={`text-2xl font-extrabold ${item.score > 80 ? 'text-emerald-500' : item.score > 60 ? 'text-yellow-500' : 'text-rose-500'}`}>{item.score}%</span>
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Match</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="glass-card p-12 text-center">
                                        <span className="text-4xl block mb-4">👻</span>
                                        <h3 className="font-bold text-slate-700 dark:text-slate-200 text-lg">No Runs Yet</h3>
                                        <p className="text-slate-500 dark:text-slate-400 mt-2 text-sm">Once you execute a resume comparison against a job description, it will be automatically saved here.</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {currentView === 'settings' && renderSettings()}
                        
                        {showScrollTop && (
                            <button 
                                onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                                className="fixed bottom-8 right-8 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-[0_10px_25px_rgba(79,70,229,0.5)] flex items-center justify-center text-2xl hover:bg-indigo-700 hover:-translate-y-1 transition-all z-50 animate-fade-in"
                                title="Scroll to Top"
                            >
                                ↑
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
