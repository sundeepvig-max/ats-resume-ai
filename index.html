<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Soul-Preserving Resume Architect</title>
    <!-- Zero-Build React Environment for Instant Prototyping -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: btn-shimmer 2s infinite;
        }
        @keyframes btn-shimmer { 100% { left: 200%; } }

        .diff-added { background-color: #dcfce7; color: #166534; padding: 0 4px; border-radius: 4px; text-decoration: none; font-weight: 600;}
        .diff-removed { background-color: #fee2e2; color: #991b1b; text-decoration: line-through; padding: 0 4px; border-radius: 4px;}
        
        /* Circular Progress */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 3.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .percentage { fill: #1e293b; font-family: sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: bold;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [step, setStep] = useState('input'); // input, analyzing, results
            const [activeTab, setActiveTab] = useState('score'); // score, diff, cover, review
            
            const [jdText, setJdText] = useState('');
            const [resumeText, setResumeText] = useState('');
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            
            const [apiData, setApiData] = useState(null);
            const fileInputRef = useRef(null);

            const MOCK_JD = "Looking for a Senior Frontend Engineer. Requirements: React, TypeScript, GraphQL, Next.js, and CI/CD pipelines. Must be able to mentor juniors and architect scalable state management.";
            const MOCK_RESUME = "Senior Web Developer at TechCorp.\nBuilt web apps with React and JavaScript.\nFixed bugs and tested code.\nHelped other devs when they got stuck on tickets.";

            const handlePopulateMocks = () => {
                setJdText(MOCK_JD);
                setResumeText(MOCK_RESUME);
            };

            const triggerFileUpload = () => {
                if (fileInputRef.current) fileInputRef.current.click();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => setResumeText(evt.target.result);
                reader.readAsText(file); // Supports TXT, Markdown, etc locally
            };

            const handleAnalyze = async () => {
                if(!jdText || !resumeText) { alert('Please provide both JD and Resume text.'); return; }
                if(!apiKey) { alert('Please enter your Gemini API Key in the top right header to analyze live.'); return; }
                
                setStep('analyzing');
                localStorage.setItem('gemini_api_key', apiKey);
                
                const prompt = `
                    You are a Senior Recruitment Architect. Perform a strict ATS gap analysis.
                    
                    Job Description:
                    ${jdText}
                    
                    Candidate Resume:
                    ${resumeText}
                    
                    Output a strictly valid JSON object (NO markdown wrappers, NO \`\`\`json text, ONLY RAW PARSABLE JSON) with this exact structure:
                    {
                        "score": [number from 0 to 100],
                        "missList": ["skill 1", "skill 2"],
                        "atsWarning": "string detailing any potential formatting warnings if resume is badly structured, or null if fine",
                        "originalRole": "The candidate's current or latest title based exactly on their resume",
                        "optimizedBullets": [
                            { "original": "exact original bullet point", "optimized": "the STAR/XYZ formatted improvement utilizing strong action verbs but actively preventing hallucination of missing skills" }
                        ],
                        "coverLetter": "A confident 3-paragraph cover letter drawing specific links between the resume impact and the JD pain points",
                        "suggestions": [
                            { "title": "Metric Injection Request", "suggestion": "You said you did X, can you quantify it to Y%?" }
                        ]
                    }
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    let rawResponse = data.candidates[0].content.parts[0].text;
                    rawResponse = rawResponse.replace(/```json/g, '').replace(/```/g, ''); // Safely strip markdown wrapping
                    
                    const parsed = JSON.parse(rawResponse);
                    setApiData(parsed);
                    setStep('results');
                } catch (err) {
                    alert("Analysis Failed: Check your API Key or Network Connection. " + err.message);
                    setStep('input');
                }
            };

            const renderInputScreen = () => (
                <div className="w-full max-w-7xl mx-auto flex flex-col gap-6 animate-fade-in">
                    <div className="flex justify-end items-center mb-[-2rem] relative z-10">
                        <input 
                            type="password" placeholder="Gemini API Key..." 
                            value={apiKey} onChange={(e) => setApiKey(e.target.value)}
                            className="bg-white border border-slate-300 text-sm px-3 py-1.5 rounded-lg shadow-sm w-64 outline-none focus:ring-2 focus:ring-indigo-500" 
                        />
                    </div>
                    
                    <div className="text-center mb-4">
                        <h1 className="text-4xl font-extrabold tracking-tight text-slate-800">Soul-Preserving <span className="text-indigo-600">ATS AI</span></h1>
                        <p className="text-slate-500 mt-2 font-medium max-w-2xl mx-auto">Upload your raw texts. Our Gemini 1.5 architecture will bypass ATS filters structurally, without hallucinating your professional identity.</p>
                        <button onClick={handlePopulateMocks} className="mt-4 text-xs font-bold bg-slate-200 text-slate-600 px-4 py-1.5 rounded-full hover:bg-slate-300 transition">Test with Sample Data</button>
                    </div>

                    <div className="grid lg:grid-cols-2 gap-8">
                        <div className="glass-card p-6 flex flex-col">
                            <h2 className="text-lg font-bold flex items-center gap-2 text-indigo-700 mb-4">📄 Target Job Description</h2>
                            <textarea 
                                value={jdText} onChange={e => setJdText(e.target.value)}
                                placeholder="Paste the exact JD text here...&#10;&#10;We extract Hard Skills, KRAs, and Culture Keywords." 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none min-h-[350px] text-sm"
                            ></textarea>
                        </div>

                        <div className="glass-card p-6 flex flex-col">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-lg font-bold flex items-center gap-2 text-blue-700">👤 Current Resume</h2>
                                
                                <button onClick={triggerFileUpload} className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200 transition">
                                    📁 Upload Text File
                                </button>
                                <input type="file" ref={fileInputRef} className="hidden" accept=".txt,.md,.csv" onChange={handleFileUpload} />
                            </div>
                            
                            <textarea 
                                value={resumeText} onChange={e => setResumeText(e.target.value)}
                                placeholder="Paste your raw resume text here, or click Upload to load a .txt extraction...&#10;&#10;We parse for Work History, Technical Stack, and Quantifiable Achievements." 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none min-h-[350px] text-sm"
                            ></textarea>
                        </div>
                    </div>

                    <div className="flex justify-center mt-6">
                        <button onClick={handleAnalyze} className="shimmer-btn bg-slate-900 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-slate-800 transition shadow-xl mt-2 mb-10">
                            Analyze & Align via Gemini →
                        </button>
                    </div>
                </div>
            );

            const renderAnalyzing = () => (
                <div className="w-full max-w-2xl mx-auto flex flex-col items-center justify-center py-20 text-center">
                    <div className="w-20 h-20 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-8"></div>
                    <h2 className="text-2xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">Gemini LLM Processing...</h2>
                    <ul className="text-slate-500 text-left space-y-3 font-medium">
                        <li className="flex items-center gap-2">✅ Live Parsing technical artifacts...</li>
                        <li className="flex items-center gap-2 text-indigo-600 font-bold">⏳ Mapping against Job Description constraints...</li>
                        <li className="flex items-center gap-2 opacity-70">⚪ Enforcing "Truth Constraint" AI rewriting...</li>
                    </ul>
                </div>
            );

            const renderResults = () => {
                if(!apiData) return null;
                
                return (
                    <div className="w-full max-w-7xl mx-auto animate-fade-in">
                        <div className="flex items-center gap-4 mb-6">
                            <button onClick={() => setStep('input')} className="bg-white border border-slate-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-50 shadow-sm border-b-2">← Back to Inputs</button>
                            <h1 className="text-2xl font-bold text-slate-800">Live Analysis Output</h1>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-6">
                            {/* Sidebar Navi */}
                            <div className="w-full lg:w-64 flex flex-col gap-2">
                                <button onClick={() => setActiveTab('score')} className={`text-left px-5 py-4 rounded-xl font-bold transition border ${activeTab === 'score' ? 'bg-indigo-600 text-white border-indigo-700 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-700'}`}>📊 Gap Score</button>
                                <button onClick={() => setActiveTab('diff')} className={`text-left px-5 py-4 rounded-xl font-bold transition border ${activeTab === 'diff' ? 'bg-indigo-600 text-white border-indigo-700 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-700'}`}>⚖️ Live Diff Viewer</button>
                                <button onClick={() => setActiveTab('cover')} className={`text-left px-5 py-4 rounded-xl font-bold transition border ${activeTab === 'cover' ? 'bg-indigo-600 text-white border-indigo-700 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-700'}`}>✉️ Smart Cover Letter</button>
                                <button onClick={() => setActiveTab('review')} className={`text-left px-5 py-4 rounded-xl font-bold transition border ${activeTab === 'review' ? 'bg-indigo-600 text-white border-indigo-700 shadow-md' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-700'}`}>💡 Critical Review</button>
                            </div>

                            {/* Content Area */}
                            <div className="flex-1 glass-card p-6 md:p-8 min-h-[500px]">
                                
                                {/* SCORE TAB */}
                                {activeTab === 'score' && (
                                    <div className="space-y-8 animate-fade-in">
                                        <div className="flex flex-col md:flex-row items-center gap-8 border-b border-slate-100 pb-8">
                                            <div className="w-48">
                                                <svg viewBox="0 0 36 36" className="circular-chart text-indigo-600">
                                                    <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                    <path className="circle" strokeDasharray={`${apiData.score}, 100`} stroke="currentColor" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                    <text x="18" y="20.35" className="percentage">{apiData.score}%</text>
                                                </svg>
                                                <p className="text-center text-sm font-bold text-slate-500 mt-2">ATS Match Velocity</p>
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="text-xl font-bold mb-3">The "Miss List"</h3>
                                                {apiData.missList && apiData.missList.length > 0 ? (
                                                    <div className="flex flex-wrap gap-2 mb-6">
                                                        {apiData.missList.map((skill, idx) => (
                                                            <span key={idx} className="bg-red-50 text-red-600 border border-red-200 px-3 py-1.5 rounded-full text-xs font-bold">Missing: {skill}</span>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <p className="text-sm text-green-600 font-bold mb-6">Incredible! No major missing skills detected mapped to JD.</p>
                                                )}
                                                
                                                {apiData.atsWarning && (
                                                    <div className="p-4 bg-orange-50 border border-orange-200 rounded-xl mb-4">
                                                        <h4 className="font-bold text-orange-800 flex items-center gap-2 mb-1">⚠️ ATS Warning Detected</h4>
                                                        <p className="text-sm text-orange-700">{apiData.atsWarning}</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <h3 className="text-lg font-bold mb-3 border-l-4 border-indigo-600 pl-3">"Truth Constraint" Audit Executed</h3>
                                            <p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                                Gemini explicitly re-wrote your experience using STAR formatting entirely mapped to authentic input constraints. <strong>I did not hallucinate the missing skills above into your diff output</strong> to prevent rejection during human review. Instead, check the "Review" tab mapping missing intersections.
                                            </p>
                                        </div>
                                    </div>
                                )}

                                {/* DIFF TAB */}
                                {activeTab === 'diff' && (
                                    <div className="animate-fade-in flex flex-col h-full">
                                        <h3 className="text-xl font-bold mb-2">Intelligent LLM Fine-Tuning</h3>
                                        <p className="text-sm text-slate-500 mb-6">Your authentic identity mapped dynamically to STAR/XYZ methodologies optimized for algorithmic ATS consumption.</p>
                                        
                                        <div className="grid md:grid-cols-2 gap-6 flex-1">
                                            {/* Original Column */}
                                            <div className="bg-slate-50 border border-slate-200 rounded-xl p-6 overflow-y-auto max-h-[500px]">
                                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 border-b pb-2">Your Input Baseline</h4>
                                                <div className="text-sm space-y-5 font-mono">
                                                    <div>
                                                        <strong className="text-slate-700">{apiData.originalRole || "Current Role"}</strong>
                                                    </div>
                                                    <ul className="list-disc pl-4 space-y-3">
                                                        {apiData.optimizedBullets && apiData.optimizedBullets.map((b, i) => (
                                                            <li key={i}><span className="diff-removed text-slate-500">{b.original}</span></li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>

                                            {/* Output Column */}
                                            <div className="bg-white border text-slate-800 border-indigo-200 rounded-xl p-6 shadow-sm overflow-y-auto max-h-[500px] relative">
                                                <div className="absolute top-4 right-4 bg-green-50 text-green-700 border border-green-200 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest shadow-sm">Optimized Output</div>
                                                <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-4 border-b pb-2">ATS Recruiter-Ready Baseline</h4>
                                                <div className="text-sm space-y-5 font-mono">
                                                    <div>
                                                        {/* The Soul logic preserving headers */}
                                                        <strong className="text-slate-900">{apiData.originalRole || "Current Role"}</strong>
                                                    </div>
                                                    <ul className="list-square pl-5 space-y-4">
                                                        {apiData.optimizedBullets && apiData.optimizedBullets.map((b, i) => (
                                                            <li key={i} className="pl-1">
                                                                <span className="diff-added">{b.optimized}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* COVER LETTER TAB */}
                                {activeTab === 'cover' && (
                                    <div className="space-y-6 animate-fade-in max-w-4xl">
                                        <h3 className="text-xl font-bold">Narrative Generation Loop</h3>
                                        <p className="text-sm text-slate-500">A dynamically crafted, highly-personalized letter integrating your specific parsed bullet impacts securely against the JD parameters.</p>
                                        
                                        <div className="bg-white border border-slate-200 rounded-xl p-8 font-serif leading-loose text-[15px] text-slate-800 shadow-sm relative relative mt-6 whitespace-pre-wrap">
                                            {apiData.coverLetter}
                                        </div>
                                    </div>
                                )}

                                {/* REVIEW TAB */}
                                {activeTab === 'review' && (
                                    <div className="space-y-6 animate-fade-in">
                                        <h3 className="text-xl font-bold">The Strategic Critique Toolkit</h3>
                                        <p className="text-sm text-slate-500 mt-[-10px] mb-6">Missing context flagged by the LLM that requires human verification before injection.</p>
                                        
                                        <div className="space-y-5">
                                            {apiData.suggestions && apiData.suggestions.map((suggestion, idx) => (
                                                <div key={idx} className="p-6 bg-white border border-slate-200 rounded-2xl shadow-sm flex gap-5 items-start transition hover:border-indigo-300">
                                                    <div className="text-2xl mt-1 p-3 bg-slate-50 rounded-xl">💡</div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800 mb-2">{suggestion.title}</h4>
                                                        <p className="text-sm text-slate-600 mb-4 leading-relaxed">{suggestion.suggestion}</p>
                                                        <div className="flex gap-2">
                                                            <input type="text" placeholder="Provide context here..." className="border border-slate-300 px-4 py-2 rounded-xl text-sm w-full max-w-sm outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-slate-50" />
                                                            <button className="bg-slate-900 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-slate-800 shadow-md">Apply Update</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-800 pb-20">
                    <div className="max-w-7xl mx-auto mb-6 flex justify-between items-center opacity-70 hover:opacity-100 transition-opacity">
                        <div className="text-xs font-bold tracking-widest uppercase text-slate-400">Gemini Native AI Architecture</div>
                    </div>
                    {step === 'input' && renderInputScreen()}
                    {step === 'analyzing' && renderAnalyzing()}
                    {step === 'results' && renderResults()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom list style */
        .list-square { list-style-type: square; }
    </style>
</body>
</html>
