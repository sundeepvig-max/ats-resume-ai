<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Soul-Preserving Resume Architect</title>
    <!-- Zero-Build React Environment for Instant Prototyping -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid rgba(226, 232, 240, 0.8); }
        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: btn-shimmer 2s infinite;
        }
        @keyframes btn-shimmer { 100% { left: 200%; } }

        .diff-added { background-color: #dcfce7; color: #166534; padding: 0 4px; border-radius: 4px; text-decoration: none; font-weight: 600;}
        .diff-removed { background-color: #fee2e2; color: #991b1b; text-decoration: line-through; padding: 0 4px; border-radius: 4px;}
        
        /* Circular Progress */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: #e2e8f0; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 3.8; stroke-linecap: round; animation: progress 1s ease-out forwards; }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .percentage { fill: #1e293b; font-family: sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: bold;}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [step, setStep] = useState('input'); // input, analyzing, results
            const [activeTab, setActiveTab] = useState('score'); // score, diff, cover, review
            
            const [jdText, setJdText] = useState('');
            const [resumeText, setResumeText] = useState('');
            
            const [score, setScore] = useState(0);

            const MOCK_JD = "Looking for a Senior Frontend Engineer. Requirements: React, TypeScript, GraphQL, Next.js, and CI/CD pipelines. Must be able to mentor juniors and architect scalable state management.";
            const MOCK_RESUME = "Senior Web Developer at TechCorp. Built web apps with React and JavaScript. Fixed bugs and tested code. Helped other devs when they got stuck on tickets.";

            const handlePopulateMocks = () => {
                setJdText(MOCK_JD);
                setResumeText(MOCK_RESUME);
            };

            const handleAnalyze = () => {
                if(!jdText || !resumeText) { alert('Please provide both JD and Resume text.'); return; }
                
                setStep('analyzing');
                
                // MOCK API DELAY FOR GEMINI EXTRACTION
                console.log("[ATS Core]: PyMuPDF extraction mock active.");
                console.log("[ATS Core]: Cleaning ligatures and symbols...");
                console.log("[ATS Core]: Feeding clean buffers to Gemini 1.5 Pro Window...");
                
                setTimeout(() => {
                    setScore(85);
                    setStep('results');
                }, 3500);
            };

            const renderInputScreen = () => (
                <div className="w-full max-w-6xl mx-auto flex flex-col gap-6 animate-fade-in">
                    <div className="text-center mb-4">
                        <h1 className="text-4xl font-extrabold tracking-tight text-slate-800">Soul-Preserving <span className="text-indigo-600">ATS Architect</span></h1>
                        <p className="text-slate-500 mt-2 font-medium">Bypass the filters without hallucinating your professional identity.</p>
                        <button onClick={handlePopulateMocks} className="mt-4 text-xs font-bold bg-slate-200 text-slate-600 px-4 py-1.5 rounded-full hover:bg-slate-300 transition">Fill with Sample Data</button>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="glass-card p-6 flex flex-col">
                            <h2 className="text-lg font-bold flex items-center gap-2 text-indigo-700 mb-4">📄 Target Job Description</h2>
                            <textarea 
                                value={jdText} onChange={e => setJdText(e.target.value)}
                                placeholder="Paste the exact JD text here or provide a URL...&#10;&#10;We extract Hard Skills, KRAs, and Culture Keywords." 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none min-h-[300px] text-sm"
                            ></textarea>
                        </div>

                        <div className="glass-card p-6 flex flex-col">
                            <h2 className="text-lg font-bold flex items-center gap-2 text-blue-700 mb-4">👤 Current Resume</h2>
                            <textarea 
                                value={resumeText} onChange={e => setResumeText(e.target.value)}
                                placeholder="Paste your raw resume text here...&#10;&#10;(In production, this hooks into Python PyMuPDF for perfect artifact-free PDF parsing)" 
                                className="flex-1 w-full bg-slate-50 border border-slate-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none min-h-[300px] text-sm"
                            ></textarea>
                        </div>
                    </div>

                    <div className="flex justify-center mt-6">
                        <button onClick={handleAnalyze} className="shimmer-btn bg-slate-900 text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-slate-800 transition shadow-xl">
                            Analyze & Align →
                        </button>
                    </div>
                </div>
            );

            const renderAnalyzing = () => (
                <div className="w-full max-w-2xl mx-auto flex flex-col items-center justify-center py-20 text-center">
                    <div className="w-20 h-20 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin mb-8"></div>
                    <h2 className="text-2xl font-bold mb-4">Gemini 1.5 Pro Processing...</h2>
                    <ul className="text-slate-500 text-left space-y-3 font-medium">
                        <li className="flex items-center gap-2">✅ Extracting technical artifacts & metrics...</li>
                        <li className="flex items-center gap-2 text-indigo-600 font-bold">⏳ Mapping against JD Hard Skills...</li>
                        <li className="flex items-center gap-2 opacity-50">⚪ Enforcing "Truth Constraint" rewriting...</li>
                    </ul>
                </div>
            );

            const renderResults = () => (
                <div className="w-full max-w-6xl mx-auto animate-fade-in">
                    <div className="flex items-center gap-4 mb-8">
                        <button onClick={() => setStep('input')} className="bg-white border border-slate-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-slate-50">← Edit Inputs</button>
                        <h1 className="text-2xl font-bold">Analysis Complete</h1>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6">
                        {/* Sidebar Navi */}
                        <div className="w-full lg:w-64 flex flex-col gap-2">
                            <button onClick={() => setActiveTab('score')} className={`text-left p-4 rounded-xl font-bold transition ${activeTab === 'score' ? 'bg-indigo-600 text-white shadow-md' : 'glass-card hover:bg-slate-50'}`}>📊 Gap Analysis</button>
                            <button onClick={() => setActiveTab('diff')} className={`text-left p-4 rounded-xl font-bold transition ${activeTab === 'diff' ? 'bg-indigo-600 text-white shadow-md' : 'glass-card hover:bg-slate-50'}`}>⚖️ Before vs After Diff</button>
                            <button onClick={() => setActiveTab('cover')} className={`text-left p-4 rounded-xl font-bold transition ${activeTab === 'cover' ? 'bg-indigo-600 text-white shadow-md' : 'glass-card hover:bg-slate-50'}`}>✉️ Smart Cover Letter</button>
                            <button onClick={() => setActiveTab('review')} className={`text-left p-4 rounded-xl font-bold transition ${activeTab === 'review' ? 'bg-indigo-600 text-white shadow-md' : 'glass-card hover:bg-slate-50'}`}>💡 Critical Catchy Review</button>
                        </div>

                        {/* Content Area */}
                        <div className="flex-1 glass-card p-6 md:p-8 min-h-[500px]">
                            
                            {/* SCORE TAB */}
                            {activeTab === 'score' && (
                                <div className="space-y-8 animate-fade-in">
                                    <div className="flex flex-col md:flex-row items-center gap-8 border-b border-slate-100 pb-8">
                                        <div className="w-48">
                                            <svg viewBox="0 0 36 36" className="circular-chart text-indigo-600">
                                                <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                <path className="circle" strokeDasharray={`${score}, 100`} stroke="currentColor" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                                <text x="18" y="20.35" className="percentage">{score}%</text>
                                            </svg>
                                            <p className="text-center text-sm font-bold text-slate-500 mt-2">ATS Match Score</p>
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="text-xl font-bold mb-2">The "Miss List"</h3>
                                            <div className="flex flex-wrap gap-2 mb-4">
                                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Missing: TypeScript</span>
                                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Missing: Next.js</span>
                                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Missing: CI/CD Pipelines</span>
                                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">Missing: GraphQL</span>
                                            </div>
                                            <div className="p-4 bg-orange-50 border border-orange-200 rounded-xl">
                                                <h4 className="font-bold text-orange-800 flex items-center gap-2 mb-1">⚠️ ATS Formatting Warning</h4>
                                                <p className="text-sm text-orange-700">We detected 2-column formatting in your original PDF. Legacy Taleo & Workday ATS systems often drop column 2 entirely. Stick to standard vertical heading blocks.</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-lg font-bold mb-3 border-l-4 border-indigo-600 pl-3">"Truth Constraint" Audit</h3>
                                        <p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                            I re-wrote your experience using STAR formatting, but <strong>I did not hallucinate Next.js or GraphQL</strong> because they weren't strictly in your upload history. Instead, in the "Review" tab, I've left prompts asking if you legitimately have this experience to inject into the rewrite.
                                        </p>
                                    </div>
                                </div>
                            )}

                            {/* DIFF TAB */}
                            {activeTab === 'diff' && (
                                <div className="animate-fade-in flex flex-col h-full">
                                    <h3 className="text-xl font-bold mb-4">Intelligent Fine-Tuning</h3>
                                    <p className="text-sm text-slate-500 mb-6">Original soul retained. Impact translated to STAR + XYZ format aligning with JD.</p>
                                    
                                    <div className="grid md:grid-cols-2 gap-4 flex-1">
                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 overflow-y-auto">
                                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 border-b pb-2">Original Input</h4>
                                            <div className="text-sm space-y-4 font-mono">
                                                <div>
                                                    <strong>Senior Web Developer</strong> | TechCorp<br/>
                                                    <span className="text-slate-400 text-xs">2020 - Present</span>
                                                </div>
                                                <ul className="list-disc pl-4 space-y-2">
                                                    <li>Build web apps with <span className="diff-removed">JavaScript</span>.</li>
                                                    <li><span className="diff-removed">Helped other devs when they got stuck on tickets.</span></li>
                                                    <li>Fixed bugs and tested code.</li>
                                                </ul>
                                            </div>
                                        </div>

                                        <div className="bg-white border-2 border-indigo-100 rounded-xl p-5 shadow-sm overflow-y-auto relative">
                                            <div className="absolute top-4 right-4 bg-green-100 text-green-700 text-xs font-bold px-2 py-1 rounded">Optimized</div>
                                            <h4 className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-4 border-b pb-2">ATS-Ready Output</h4>
                                            <div className="text-sm space-y-4 font-mono text-slate-800">
                                                <div>
                                                    {/* Crucial! We preserved the soul (titles/dates) */}
                                                    <strong>Senior Web Developer</strong> | TechCorp<br/>
                                                    <span className="text-slate-400 text-xs">2020 - Present</span>
                                                </div>
                                                <ul className="list-disc pl-4 space-y-3">
                                                    <li>Architected scalable web applications utilizing <span className="diff-added">React and modern frontend stacks</span>.</li>
                                                    <li><span className="diff-added">Mentored junior engineering teams</span>, significantly reducing ticket resolution time and elevating codebase quality.</li>
                                                    <li>Resolved critical production constraints via structured testing <span className="diff-added">and performance profiling</span>.</li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-4 flex justify-end">
                                        <button className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700">Export as Markdown</button>
                                    </div>
                                </div>
                            )}

                            {/* COVER LETTER TAB */}
                            {activeTab === 'cover' && (
                                <div className="space-y-6 animate-fade-in">
                                    <h3 className="text-xl font-bold">Narrative Cover Letter</h3>
                                    <p className="text-sm text-slate-500">I connected your "Mentoring" experience directly to the JD's requirement for "Mentor juniors and architect state".</p>
                                    
                                    <div className="bg-white border border-slate-200 rounded-xl p-8 font-serif leading-relaxed text-sm text-slate-800 shadow-sm relative">
                                        <div className="absolute top-0 right-0 p-4 opacity-10 text-6xl">✉️</div>
                                        <p className="mb-4">Dear Hiring Manager,</p>
                                        <p className="mb-4">When I read the Senior Frontend Engineer opening, the requirement that stood out most to me was the immediate need to mentor junior engineers while architecting scalable state infrastructure. At TechCorp, my proudest achievements haven't just been in shipping code, but in actively leveling up my fellow developers and clearing their blockers on complex tickets.</p>
                                        <p className="mb-4">You are looking for someone who can drive React innovation while ensuring the team moves cohesively. That is precisely where I thrive. By combining my hands-on React expertise with a proactive approach to team guidance, I am deeply equipped to tackle your architectural hurdles.</p>
                                        <p>I would welcome the opportunity to discuss how my technical execution and team enablement align with your goals for the engineering department.</p>
                                        <p className="mt-6">Best regards,<br/><span className="text-slate-400">[Your Name]</span></p>
                                    </div>
                                </div>
                            )}

                            {/* REVIEW TAB */}
                            {activeTab === 'review' && (
                                <div className="space-y-6 animate-fade-in">
                                    <h3 className="text-xl font-bold">The "Catchy" Critique & Enhancements</h3>
                                    
                                    <div className="space-y-4">
                                        <div className="p-5 bg-white border border-indigo-100 rounded-xl shadow-sm flex gap-4 items-start">
                                            <div className="text-2xl mt-1">💡</div>
                                            <div>
                                                <h4 className="font-bold mb-1">Metric Injection Request</h4>
                                                <p className="text-sm text-slate-600 mb-3">Your summary is too passive. You say "Helped other devs". Do you know roughly how many junior developers you mentored, or by what percentage you improved team velocity?</p>
                                                <div className="flex gap-2">
                                                    <input type="text" placeholder="e.g. 5 juniors, 30% faster" className="border border-slate-300 px-3 py-1.5 rounded-lg text-sm w-64 outline-none focus:border-indigo-500" />
                                                    <button className="bg-indigo-100 text-indigo-700 px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-indigo-200">Apply Update</button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-5 bg-white border border-orange-100 rounded-xl shadow-sm flex gap-4 items-start">
                                            <div className="text-2xl mt-1">🎯</div>
                                            <div>
                                                <h4 className="font-bold mb-1">Missing Skill Check</h4>
                                                <p className="text-sm text-slate-600 mb-3">The JD heavily emphasizes <strong>Next.js</strong>. I did not auto-add it to preserve honesty. Do you have any prior experience using Next.js on personal projects or older roles?</p>
                                                <button className="bg-white border border-slate-300 text-slate-700 px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-slate-50 mr-2">No</button>
                                                <button className="bg-orange-100 text-orange-700 px-4 py-1.5 rounded-lg font-bold text-sm hover:bg-orange-200">Yes, Add It</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen p-4 md:p-8 text-slate-800">
                    {step === 'input' && renderInputScreen()}
                    {step === 'analyzing' && renderAnalyzing()}
                    {step === 'results' && renderResults()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
